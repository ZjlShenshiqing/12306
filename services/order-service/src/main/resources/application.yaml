server:
  port: 9003

spring:
  application:
    name: index12306-order${unique-name:}-service
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.150.100:8848
      password: nacos
      username: nacos
    sentinel:
      transport:
        dashboard: 192.168.150.100:8686
        port: 8719
  data:
    redis:
      host: 192.168.150.100
      port: 6379

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # mapper-locations: classpath:mapper/*.xml

framework:
  fastjson:
    safe-mode: true
  cache:
    redis:
      value-timeout: 16
      value-time-unit: days

rocketmq:
  name-server: 192.168.150.100:9876
  producer:
    group: index12306_order${unique-name:}-service_common-message-execute_pg
    send-message-timeout: 2000
    retry-times-when-send-failed: 1
    retry-times-when-send-async-failed: 1

# 订单按 orderSn 查询兜底：当 ShardingSphere 路由查不到时，直接遍历物理表
# 若 MySQL 不在 192.168.150.100，请改为实际 IP（与 shardingsphere-config 中一致）
order:
  query-fallback:
    enabled: true
    datasources:
      - url: jdbc:mysql://192.168.150.100:3306/12306_order_0?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: 123456Po*
      - url: jdbc:mysql://192.168.150.100:3306/12306_order_1?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: 123456Po*

management:
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    tags:
      application: ${spring.application.name}
